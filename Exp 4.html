<!DOCTYPE html>
<html>
<head>
<title>Student Result Analyzer</title>

<style>

body{
font-family:Arial;
background:linear-gradient(135deg,#84fab0,#8fd3f4);
height:100vh;
display:flex;
justify-content:center;
align-items:center;
}

.container{
background:white;
padding:30px;
border-radius:12px;
width:350px;
text-align:center;
box-shadow:0 10px 20px rgba(0,0,0,0.2);
}

input{
width:90%;
padding:10px;
margin:6px;
border-radius:6px;
border:1px solid gray;
}

button{
padding:10px 15px;
margin-top:8px;
border:none;
border-radius:8px;
background:#43cea2;
color:white;
font-weight:bold;
cursor:pointer;
}

button:hover{
background:#185a9d;
}

#result{
margin-top:15px;
font-weight:bold;
}

</style>
</head>

<body>

<div class="container">

<h2>Result Analyzer</h2>

<input type="text" id="name" placeholder="Student Name">
<input type="number" id="subjects" placeholder="Number of Subjects">

<button onclick="enterMarks()">Enter Marks (Popup)</button>
<button onclick="calculate()">Calculate Result</button>

<div id="result"></div>

</div>

<script>

let marks = [];

function enterMarks(){

marks = [];

let subjects = Number(document.getElementById("subjects").value);

if(subjects <= 0 || isNaN(subjects)){
alert("Please enter valid number of subjects");
return;
}

for(let i=1; i<=subjects; i++){

let input = prompt("Enter marks for Subject " + i);

let mark = Number(input);

if(isNaN(mark) || mark < 0 || mark > 100){
alert("Invalid marks! Enter between 0 and 100");
i--; // repeat same subject
} else {
marks.push(mark);
}

}

alert("Marks entered successfully!");
}

function calculate(){

if(marks.length === 0){
alert("Please enter marks first!");
return;
}

let total = marks.reduce((sum, m) => sum + m, 0);
let avg = total / marks.length;

let grade = "";

if(avg >= 90) grade = "A+";
else if(avg >= 75) grade = "A";
else if(avg >= 60) grade = "B";
else if(avg >= 50) grade = "C";
else grade = "F";

let status = avg >= 50 ? "PASS" : "FAIL";

let name = document.getElementById("name").value || "Student";

document.getElementById("result").innerHTML =
`Name: ${name} <br>
Total: ${total} <br>
Average: ${avg.toFixed(2)} <br>
Grade: ${grade} <br>
Result: ${status}`;

}

</script>

</body>
</html>
