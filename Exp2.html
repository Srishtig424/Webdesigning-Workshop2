<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TechStore</title>

    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body{
            background-color:#f5f5f5;
        }

        .navbar{
            background-color:#1f242c;
        }

        .navbar-brand,
        .nav-link{
            color:white !important;
        }

        .product-img{
            height:200px;
            object-fit:contain;
        }

        footer{
            background-color:#1f242c;
            color:white;
            text-align:center;
            padding:15px;
            margin-top:40px;
        }
    </style>
</head>
<body>

    <!-- Navbar -->
    <nav class="navbar navbar-expand-lg">
        <div class="container">
            <a class="navbar-brand" href="#">TechStore</a>

            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#menu">
                <span class="navbar-toggler-icon"></span>
            </button>

            <div class="collapse navbar-collapse" id="menu">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item">
                        <a class="nav-link" href="#">Home</a>
                    </li>

                    <li class="nav-item">
                        <a class="nav-link" href="#">Products</a>
                    </li>

                    <li class="nav-item">
                        <a class="nav-link" href="#">About</a>
                    </li>

                    <li class="nav-item">
                        <a class="nav-link" href="#">Contact</a>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <!-- Product Section -->
    <div class="container my-5">
        <div class="row g-4">

            <!-- Laptop -->
            <div class="col-md-4">
                <div class="card h-100">
                    <img src="https://via.placeholder.com/300x200?text=Laptop"
                         class="card-img-top product-img"
                         alt="Laptop">

                    <div class="card-body">
                        <h4 class="card-title">Laptop</h4>
                        <p class="text-muted">High performance laptop</p>

                        <h5>
                            ₹50,000
                            <span class="badge bg-success">New</span>
                        </h5>

                        <button class="btn btn-primary mt-2">
                            View Details
                        </button>
                    </div>
                </div>
            </div>

            <!-- Mobile -->
            <div class="col-md-4">
                <div class="card h-100">
                    <img src="https://via.placeholder.com/300x200?text=Mobile"
                         class="card-img-top product-img"
                         alt="Mobile">

                    <div class="card-body">
                        <h4 class="card-title">Mobile</h4>
                        <p class="text-muted">Latest smartphone</p>

                        <h5>
                            ₹30,000
                            <span class="badge bg-danger">Sale</span>
                        </h5>

                        <button class="btn btn-primary mt-2">
                            View Details
                        </button>
                    </div>
                </div>
            </div>

            <!-- Headphones -->
            <div class="col-md-4">
                <div class="card h-100">
                    <img src="https://via.placeholder.com/300x200?text=Headphones"
                         class="card-img-top product-img"
                         alt="Headphones">

                    <div class="card-body">
                        <h4 class="card-title">Headphones</h4>
                        <p class="text-muted">Noise cancelling</p>

                        <h5>
                            ₹5,000
                            <span class="badge bg-success">New</span>
                        </h5>

                        <button class="btn btn-primary mt-2">
                            View Details
                        </button>
                    </div>
                </div>
            </div>

        </div>
    </div>

    <!-- Footer -->
    <footer>
        © 2026 TechStore | Follow us on social media
    </footer>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
